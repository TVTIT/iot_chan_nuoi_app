name: Delete all workflow runs

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
        - name: Delete Draft Releases
          uses: hugo19941994/delete-draft-releases@v2.0.0
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
